name: TikTok → Facebook Reel

on:
  schedule:
    - cron: '30 15  * * *'   # IST 09:00 PM
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg
          pip install requests yt-dlp

      - name: Restore dedupe cache
        uses: actions/cache@v4
        with:
          path: |
            upload_history.txt
            hash_history.txt
          key: dedupe-${{ github.run_number }}
          restore-keys: dedupe-

      - name: Run pipeline
        env:
          TIKTOK_PROFILE_ID: ${{ secrets.TIKTOK_PROFILE_ID }}
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          WATERMARK_TEXT:    ${{ secrets.WATERMARK_TEXT }}
        run: python tiktok_fb_pipeline.py

      - name: Save dedupe cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            upload_history.txt
            hash_history.txt
          key: dedupe-${{ github.run_number }}
